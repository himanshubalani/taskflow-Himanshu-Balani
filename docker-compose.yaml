version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-taskflow_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-taskflow_pass}
      POSTGRES_DB: ${DB_NAME:-taskflow_db}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-taskflow_user} -d ${DB_NAME:-taskflow_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: amacneil/dbmate
    environment:
      DATABASE_URL: postgres://${DB_USER:-taskflow_user}:${DB_PASSWORD:-taskflow_pass}@db:5432/${DB_NAME:-taskflow_db}
    volumes:
      - ./db:/db
    command: up
    depends_on:
      db:
        condition: service_healthy

  backend:
    build: ./backend
    environment:
      - DATABASE_URL=postgres://${DB_USER:-taskflow_user}:${DB_PASSWORD:-taskflow_pass}@db:5432/${DB_NAME:-taskflow_db}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key_change_in_production_998231}
      - PORT=4000
    ports:
      - "4000:4000"
    depends_on:
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:4000}
    ports:
      - "3000:80"